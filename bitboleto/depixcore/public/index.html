<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DepixCore — Contabilidade</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .nav-link { transition: background .15s, color .15s; }
    .nav-link.active { background: rgba(255,255,255,0.12); color: #fff; }
    .nav-link:hover:not(.active) { background: rgba(255,255,255,0.06); }
    .card { background:#fff; border-radius:.75rem; box-shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05); }
    .skel { background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:.375rem; }
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:#f1f5f9}
    ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

    /* Print styles — painel mensal vira relatório PDF */
    @media print {
      #sidebar, #top-nav, .no-print { display: none !important; }
      #app { display: block !important; }
      main { margin-left: 0 !important; }
      .card { box-shadow: none !important; border: 1px solid #e2e8f0; }
      body { background: white; }
      #print-header { display: block !important; }
    }
    #print-header { display: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">

<!-- =================== LOGIN =================== -->
<div id="login-page" class="hidden min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-800 via-slate-700 to-slate-900 p-4">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-blue-600 rounded-2xl mb-4 shadow-lg shadow-blue-200">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-slate-900">DepixCore</h1>
      <p class="text-slate-500 text-sm mt-1">Painel de Contabilidade</p>
    </div>
    <div id="login-error" class="hidden bg-red-50 border border-red-100 text-red-700 text-sm rounded-xl p-3 mb-4"></div>
    <form id="login-form" class="space-y-4" autocomplete="on">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">E-mail</label>
        <input type="email" id="login-email" autocomplete="email" required
          class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
          placeholder="seu@email.com">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Senha</label>
        <input type="password" id="login-password" autocomplete="current-password" required
          class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
          placeholder="••••••••">
      </div>
      <button type="submit" id="login-btn"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl text-sm transition-colors">
        Entrar
      </button>
    </form>
  </div>
</div>

<!-- =================== APP =================== -->
<div id="app" class="hidden min-h-screen flex">

  <!-- Sidebar -->
  <aside id="sidebar" class="w-60 bg-slate-800 text-white flex flex-col fixed h-full z-20 shadow-xl">
    <div class="px-5 py-5 border-b border-slate-700/60">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
          </svg>
        </div>
        <div>
          <p class="font-semibold text-sm">DepixCore</p>
          <p class="text-slate-400 text-xs">Simples Nacional</p>
        </div>
      </div>
    </div>

    <nav class="flex-1 p-3 space-y-0.5 overflow-y-auto">
      <a href="#dashboard" data-page="dashboard" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-slate-300 cursor-pointer">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
        Dashboard
      </a>
      <a href="#mensal" data-page="mensal" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-slate-300 cursor-pointer">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 14l6-6m-5.5.5h.01m4.99 5h.01M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16l3.5-2 3.5 2 3.5-2 3.5 2zM10 8.5a.5.5 0 11-1 0 .5.5 0 011 0zm5 5a.5.5 0 11-1 0 .5.5 0 011 0z"/></svg>
        Mensal / DAS
      </a>
      <a href="#transactions" data-page="transactions" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-slate-300 cursor-pointer">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Transações
      </a>
      <a href="#audit" data-page="audit" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-slate-300 cursor-pointer">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        Auditoria
      </a>
    </nav>

    <div class="p-3 border-t border-slate-700/60">
      <div class="flex items-center gap-2.5 p-2 rounded-xl bg-slate-700/40 mb-2">
        <div class="w-8 h-8 bg-blue-700 rounded-lg flex items-center justify-center flex-shrink-0">
          <span id="user-avatar" class="text-xs font-bold text-white">?</span>
        </div>
        <div class="flex-1 min-w-0">
          <p id="user-name" class="text-sm font-medium text-white truncate">...</p>
          <p id="user-email" class="text-xs text-slate-400 truncate">...</p>
        </div>
      </div>
      <button onclick="logout()" class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-xs text-slate-400 hover:text-white hover:bg-slate-700/60 transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Sair
      </button>
    </div>
  </aside>

  <main class="flex-1 ml-60 min-h-screen">
    <div id="page-content" class="p-8 max-w-7xl mx-auto"></div>
  </main>
</div>

<script>
// ============================================================
// AUTH
// ============================================================
function getToken(){ return localStorage.getItem('dc_token'); }
function getUser(){ try{ return JSON.parse(localStorage.getItem('dc_user')||'null'); }catch{ return null; } }

async function doLogin(email,password){
  const btn=document.getElementById('login-btn'), err=document.getElementById('login-error');
  btn.textContent='Entrando...'; btn.disabled=true; err.classList.add('hidden');
  try{
    const r=await fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'Erro ao entrar');
    localStorage.setItem('dc_token',d.token);
    localStorage.setItem('dc_user',JSON.stringify(d.user));
    showApp(); navigate(window.location.hash.slice(1)||'dashboard');
  }catch(e){ err.textContent=e.message; err.classList.remove('hidden'); }
  finally{ btn.textContent='Entrar'; btn.disabled=false; }
}
function logout(){ localStorage.removeItem('dc_token'); localStorage.removeItem('dc_user'); showLogin(); }

// ============================================================
// API
// ============================================================
async function api(path,opts={}){
  const token=getToken();
  const r=await fetch(path,{...opts,headers:{'Content-Type':'application/json',...(token?{Authorization:`Bearer ${token}`}:{}),...(opts.headers||{})}});
  if(r.status===401){ logout(); return null; }
  return r.json();
}

// ============================================================
// VIEWS
// ============================================================
function showLogin(){ document.getElementById('login-page').classList.remove('hidden'); document.getElementById('app').classList.add('hidden'); window.location.hash=''; }
function showApp(){
  document.getElementById('login-page').classList.add('hidden'); document.getElementById('app').classList.remove('hidden');
  const u=getUser();
  if(u){ document.getElementById('user-name').textContent=u.name; document.getElementById('user-email').textContent=u.email; document.getElementById('user-avatar').textContent=u.name.charAt(0).toUpperCase(); }
}

// ============================================================
// NAVIGATION
// ============================================================
function navigate(page){
  const valid=['dashboard','mensal','transactions','audit'];
  page=valid.includes(page)?page:'dashboard';
  document.querySelectorAll('.nav-link').forEach(el=>{
    const a=el.dataset.page===page;
    el.classList.toggle('active',a); el.classList.toggle('text-white',a); el.classList.toggle('text-slate-300',!a);
  });
  if(page==='dashboard')     renderDashboard();
  else if(page==='mensal')   renderMensal();
  else if(page==='transactions') renderTransactions(1,{});
  else if(page==='audit')    renderAudit(1);
}

// ============================================================
// FORMATTERS
// ============================================================
const fmtBRL = v => v==null?'—':new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v);
const fmtDT  = d => d?new Intl.DateTimeFormat('pt-BR',{dateStyle:'short',timeStyle:'short'}).format(new Date(d)):'—';
const fmtD   = d => d?new Intl.DateTimeFormat('pt-BR',{dateStyle:'short'}).format(new Date(d)):'—';
const fmtPct = v => v==null?'—':(v).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1})+'%';
const fmtMo  = m=>{ const[y,mo]=m.split('-'); return new Intl.DateTimeFormat('pt-BR',{month:'short',year:'2-digit'}).format(new Date(y,mo-1)); };
const fmtMonthFull = m=>{ const[y,mo]=m.split('-'); return new Intl.DateTimeFormat('pt-BR',{month:'long',year:'numeric'}).format(new Date(y,mo-1)); };

function taxBracket(amount, type){
  if(type!=='boleto'||!amount) return 'N/A';
  if(amount<50) return '4%';
  if(amount<100) return '3%';
  if(amount<500) return '2.5%';
  return '2%';
}

function badge(type){
  if(!type) return 'bg-slate-100 text-slate-600';
  if(type.includes('approved')||type.includes('completed')||type.includes('paid')) return 'bg-emerald-100 text-emerald-700';
  if(type.includes('refused')) return 'bg-red-100 text-red-700';
  if(type.includes('received')) return 'bg-blue-100 text-blue-700';
  return 'bg-slate-100 text-slate-600';
}

// ============================================================
// DASHBOARD
// ============================================================
let _charts={};
function destroyCharts(){ Object.values(_charts).forEach(c=>c&&c.destroy&&c.destroy()); _charts={}; }

async function renderDashboard(){
  const el=document.getElementById('page-content');
  el.innerHTML=`
    <div class="mb-7"><h1 class="text-2xl font-bold">Dashboard</h1><p class="text-slate-500 text-sm mt-1">Visão financeira consolidada — todos os períodos</p></div>
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6" id="kpis">${[...Array(4)].map(()=>`<div class="card p-5"><div class="skel h-3 w-24 mb-3"></div><div class="skel h-8 w-32 mb-2"></div><div class="skel h-3 w-20"></div></div>`).join('')}</div>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-5 mb-6">
      <div class="card p-6 lg:col-span-2"><h2 class="font-semibold text-sm text-slate-900 mb-4">Receita vs Custos — últimos 6 meses</h2><canvas id="chart-monthly" height="160"></canvas></div>
      <div class="card p-6"><h2 class="font-semibold text-sm text-slate-900 mb-4">Por tipo de transação</h2><canvas id="chart-type" height="160"></canvas></div>
    </div>
    <div class="card overflow-hidden">
      <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
        <h2 class="font-semibold text-sm text-slate-900">Últimas transações</h2>
        <a href="#transactions" onclick="navigate('transactions')" class="text-blue-600 text-xs hover:underline">Ver todas →</a>
      </div>
      <div id="recent-tx"><div class="p-8 text-center text-slate-400 text-sm">Carregando...</div></div>
    </div>`;

  destroyCharts();

  const [summary,monthly,recent]=await Promise.all([
    api('/depixcore/dashboard/summary'),
    api('/depixcore/dashboard/monthly?months=6'),
    api('/depixcore/transactions?limit=8&page=1'),
  ]);
  if(!summary||!monthly||!recent) return;

  const s=summary.data;
  document.getElementById('kpis').innerHTML=`
    <div class="card p-5 border-l-4 border-blue-500">
      <p class="text-xs font-medium text-slate-500 uppercase tracking-wide mb-1">Receita Bruta (Taxas)</p>
      <p class="text-2xl font-bold text-slate-900">${fmtBRL(s.totalFees)}</p>
      <p class="text-xs text-slate-400 mt-1">${s.approvedCount} transações aprovadas</p>
    </div>
    <div class="card p-5 border-l-4 border-red-400">
      <p class="text-xs font-medium text-slate-500 uppercase tracking-wide mb-1">Custos Eueln (1%)</p>
      <p class="text-2xl font-bold text-red-600">-${fmtBRL(s.estimatedCosts)}</p>
      <p class="text-xs text-slate-400 mt-1">Comissão conversão cripto</p>
    </div>
    <div class="card p-5 border-l-4 border-emerald-500">
      <p class="text-xs font-medium text-slate-500 uppercase tracking-wide mb-1">Receita Líquida (Base DAS)</p>
      <p class="text-2xl font-bold text-emerald-700">${fmtBRL(s.netProfit)}</p>
      <p class="text-xs text-slate-400 mt-1">Margem ${fmtPct(s.totalFees>0?(s.netProfit/s.totalFees)*100:0)}</p>
    </div>
    <div class="card p-5 border-l-4 border-slate-300">
      <p class="text-xs font-medium text-slate-500 uppercase tracking-wide mb-1">Volume Transacional</p>
      <p class="text-2xl font-bold text-slate-700">${fmtBRL(s.grossVolume)}</p>
      <p class="text-xs text-slate-400 mt-1">Não é receita — apenas informativo</p>
    </div>`;

  const months=monthly.data;
  _charts.monthly=new Chart(document.getElementById('chart-monthly').getContext('2d'),{
    type:'bar',
    data:{
      labels:months.map(m=>fmtMo(m.month)),
      datasets:[
        {label:'Receita Bruta',data:months.map(m=>m.totalFees),backgroundColor:'rgba(59,130,246,0.75)',borderRadius:5},
        {label:'Custos Eueln',data:months.map(m=>m.estimatedCosts),backgroundColor:'rgba(239,68,68,0.65)',borderRadius:5},
        {label:'Receita Líquida',data:months.map(m=>m.netProfit),backgroundColor:'rgba(16,185,129,0.75)',borderRadius:5},
      ],
    },
    options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:12}}},
      scales:{y:{ticks:{callback:v=>'R$\u00A0'+Number(v).toLocaleString('pt-BR'),font:{size:10}},grid:{color:'#f1f5f9'}},x:{grid:{display:false}}}},
  });

  _charts.type=new Chart(document.getElementById('chart-type').getContext('2d'),{
    type:'doughnut',
    data:{labels:['Boleto','Recarga','Cobrança'],
      datasets:[{data:[s.byType.boleto,s.byType.recharge,s.byType.charge],backgroundColor:['#3b82f6','#8b5cf6','#f59e0b'],borderWidth:0,hoverOffset:4}]},
    options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:12}}},cutout:'65%'},
  });

  const rows=recent.data||[];
  document.getElementById('recent-tx').innerHTML=rows.length===0
    ?'<p class="text-center text-slate-400 text-sm py-8">Nenhuma transação ainda</p>'
    :`<div class="overflow-x-auto"><table class="w-full text-sm">
      <thead><tr class="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-100">
        <th class="px-5 py-3 text-left font-medium">Data</th>
        <th class="px-5 py-3 text-left font-medium">Evento</th>
        <th class="px-5 py-3 text-left font-medium">Faixa</th>
        <th class="px-5 py-3 text-right font-medium">Rec. Bruta</th>
        <th class="px-5 py-3 text-right font-medium">Custo Eueln</th>
        <th class="px-5 py-3 text-right font-medium">Rec. Líquida</th>
      </tr></thead>
      <tbody class="divide-y divide-slate-50">
      ${rows.map(r=>`<tr class="hover:bg-slate-50/60">
        <td class="px-5 py-3 text-slate-400 text-xs">${fmtD(r.processedAt)}</td>
        <td class="px-5 py-3"><span class="px-2 py-0.5 rounded-full text-xs font-medium ${badge(r.eventType)}">${r.eventType}</span></td>
        <td class="px-5 py-3 text-xs font-mono text-slate-600">${taxBracket(r.amount,r.transactionType)}</td>
        <td class="px-5 py-3 text-right text-blue-700 font-medium">${fmtBRL(r.fee)}</td>
        <td class="px-5 py-3 text-right text-red-500">${fmtBRL(r.cost)}</td>
        <td class="px-5 py-3 text-right text-emerald-700 font-semibold">${fmtBRL(r.netProfit)}</td>
      </tr>`).join('')}
      </tbody></table></div>`;
}

// ============================================================
// MENSAL / DAS
// ============================================================
function currentMonth(){ const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`; }
function prevMonth(m){ const d=new Date(m+'-01'); d.setMonth(d.getMonth()-1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function nextMonth(m){ const d=new Date(m+'-01'); d.setMonth(d.getMonth()+1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }

let _mensalMonth = currentMonth();

async function renderMensal(month){
  if(month) _mensalMonth=month;
  const m=_mensalMonth;
  const el=document.getElementById('page-content');

  el.innerHTML=`
    <!-- Print header (hidden on screen) -->
    <div id="print-header" class="mb-6 pb-4 border-b-2 border-slate-800">
      <h1 class="text-2xl font-bold text-slate-900">Relatório Financeiro — DepixCore</h1>
      <p class="text-slate-600 mt-1">Período: ${fmtMonthFull(m)} &nbsp;|&nbsp; Gerado em: ${fmtDT(new Date().toISOString())}</p>
      <p class="text-sm text-slate-500 mt-1">Regime: Simples Nacional — Base de cálculo: RECEITA LÍQUIDA</p>
    </div>

    <!-- Month nav -->
    <div class="flex items-center justify-between mb-6 no-print">
      <div>
        <h1 class="text-2xl font-bold">Mensal / DAS</h1>
        <p class="text-slate-500 text-sm mt-1">Base de cálculo para o Simples Nacional</p>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="renderMensal('${prevMonth(m)}')" class="p-2 rounded-lg border border-slate-200 hover:bg-slate-50 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <span class="px-4 py-2 bg-white rounded-lg border border-slate-200 font-semibold text-slate-800 min-w-36 text-center capitalize">${fmtMonthFull(m)}</span>
        <button onclick="renderMensal('${nextMonth(m)}')" class="p-2 rounded-lg border border-slate-200 hover:bg-slate-50 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>

    <div id="mensal-content"><div class="card p-12 text-center text-slate-400">Carregando...</div></div>`;

  const res=await api(`/depixcore/dashboard/monthly-detail?month=${m}`);

async function downloadCSV(month){
  const start=month+'-01';
  const endDate=new Date(month+'-01'); endDate.setMonth(endDate.getMonth()+1);
  const end=endDate.toISOString().substring(0,10);

  const data=await api(`/depixcore/transactions?limit=5000&page=1&startDate=${start}&endDate=${end}T23:59:59`);
  if(!data||!data.data) return;

  const rows=data.data;
  const header=['ID','Data','Evento','Tipo','Faixa Taxa','ID Transacao','Valor Boleto','Receita Bruta (Taxa)','Custo Eueln','Receita Liquida','Sandbox'];
  const lines=[header.join(';')];

  for(const r of rows){
    lines.push([
      r.id,
      fmtDT(r.processedAt),
      r.eventType,
      r.transactionType,
      taxBracket(r.amount,r.transactionType),
      r.transactionId||'',
      (r.amount||0).toFixed(2).replace('.',','),
      (r.fee||0).toFixed(2).replace('.',','),
      (r.cost||0).toFixed(2).replace('.',','),
      (r.netProfit||0).toFixed(2).replace('.',','),
      r.isSandbox?'Sim':'Nao',
    ].join(';'));
  }

  const bom='\uFEFF'; // BOM para Excel abrir corretamente
  const blob=new Blob([bom+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`depixcore_${month}.csv`; a.click();
  URL.revokeObjectURL(url);
}
