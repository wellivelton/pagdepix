<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 65 77" width="65" height="77">
  <!--
    DePix logo — recreated as clean vector from pixel analysis of depix.png
    Teal: #6DD6CE  Dark navy: #1E3D5A
  -->

  <!-- Outer rounded rectangle border (teal stroke, transparent fill) -->
  <rect x="10" y="3" width="44" height="44" rx="5"
        fill="none" stroke="#6DD6CE" stroke-width="6"/>

  <!-- Upper bowl of the "B" shape (teal) — narrows top-to-center -->
  <path d="M 25 11 L 35 11 Q 44 11 44 17 L 25 17 Z" fill="#6DD6CE"/>

  <!-- Lower bowl of the "B" shape (teal) — wider arc, narrows toward bottom -->
  <path d="M 25 17 L 44 17 Q 46 25 44 33 Q 41 39 35 39 L 25 39 Z" fill="#6DD6CE"/>

  <!-- Middle teal stem (visible between the two dark cross-bars) -->
  <rect x="19" y="17" width="7" height="16" fill="#6DD6CE"/>

  <!-- Dark cross-bar — TOP (pierces through top border, y=−1 to y=16) -->
  <rect x="19" y="-1" width="7" height="18" fill="#1E3D5A"/>

  <!-- Dark cross-bar — BOTTOM (inside border only, y=33 to y=43) -->
  <rect x="19" y="33" width="7" height="11" fill="#1E3D5A"/>

  <!-- "DEPIX" label -->
  <text x="32.5" y="70"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="11" font-weight="900"
        fill="#1E3D5A"
        text-anchor="middle"
        letter-spacing="2.2">DEPIX</text>
</svg>
