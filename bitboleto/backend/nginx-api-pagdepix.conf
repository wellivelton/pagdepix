# CORS: origens permitidas (precisa estar no contexto http)
map $http_origin $cors_origin {
    default "";
    "~^https://(www\.)?pagdepix\.com$" $http_origin;
    "~^http://localhost(:[0-9]+)?$" $http_origin;
}

server {
    listen 80;
    server_name api.pagdepix.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.pagdepix.com;

    ssl_certificate /etc/letsencrypt/live/api.pagdepix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.pagdepix.com/privkey.pem;

    # Permite upload de arquivos até 50MB (capa de produto, etc.)
    client_max_body_size 50M;

    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
            add_header Access-Control-Allow-Credentials "true";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
    }

    # Resposta 413 com CORS para o navegador exibir mensagem em vez de "CORS bloqueado"
    error_page 413 = @cors_413;
    location @cors_413 {
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Content-Type application/json;
        return 413 '{"error":"Arquivo muito grande. Máximo 50MB."}';
    }
}
